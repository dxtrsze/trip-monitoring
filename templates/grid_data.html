<!DOCTYPE html>
<html>
<head>
    <title>Database Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@handsontable/search/dist/search.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" rel="stylesheet">
    <style>
        #grid-container { width: 1500px; height: 500px; margin: 20px; }
        .button-container { margin: 20px; }
        .action-btn { 
            padding: 10px 20px; 
            margin-right: 10px;
            border: none; 
            cursor: pointer; 
            border-radius: 4px;
        }
        .save-btn { background: #28a745; color: white; }
        .add-btn { background: #ffc107; color: black; }
        .refresh-btn { background: #17a2b8; color: white; }
        .search-container { margin: 20px; }
        .search-input { padding: 8px; margin-right: 10px; width: 300px; }
        .filter-controls { margin: 10px 0; }
        .filter-checkbox { margin-right: 15px; }
        .filter-info { margin: 10px 0; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h2>Database Grid</h2>
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search in grid...">
        <button class="search-btn" onclick="performFilter()">Filter Rows</button>
        <button class="clear-btn" onclick="clearSearch()">Clear Filter</button>
        
        <div class="filter-controls">
            <label class="filter-checkbox">
                <input type="checkbox" id="case-sensitive"> Case sensitive
            </label>
            <label class="filter-checkbox">
                <input type="checkbox" id="exact-match"> Exact match
            </label>
        </div>
        <div class="filter-info" id="filter-info"></div>
    </div>

    <div id="grid-container"></div>
    
    <div class="button-container">
        <a href="/add"><button class="action-btn add-btn">Add New Employee</button></a>
        <button class="action-btn refresh-btn" onclick="refreshData()">Refresh Data</button>
        <button class="action-btn save-btn" onclick="saveData()">Save Changes</button>
    </div>

<script>
    const container = document.getElementById('grid-container');
    let originalData = []; // Store original data for filtering
    let currentFilter = ''; // Track current filter

    const hot = new Handsontable(container, {
        data: [],
        colHeaders: ['ID', 'Posting Date', 'Document Number', 'Item No.', 'Ordered Qty', 'Total CBM', 'Delivered Qty', 'Branch', 'Status', 'Due Date'],
        rowHeaders: true,
        height: 500,
        stretchH: 'all',
        columns: [
            { type: 'numeric', readOnly: true },
            { type: 'date' },
            { type: 'text' },
            { type: 'text' },
            { type: 'numeric' },
            { type: 'numeric' },
            { type: 'numeric' },
            { type: 'text' },
            { type: 'text' },
            { type: 'date' },
        ],
        licenseKey: 'non-commercial-and-evaluation'
    });

    // Function to perform filtering (show only matching rows)
    function performFilter() {
        const searchInput = document.getElementById('search-input').value;
        const caseSensitive = document.getElementById('case-sensitive').checked;
        const exactMatch = document.getElementById('exact-match').checked;
        
        if (searchInput) {
            currentFilter = searchInput;
            
            const filteredData = originalData.filter(row => {
                return row.some(cell => {
                    if (cell === null || cell === undefined) return false;
                    
                    const cellValue = String(cell);
                    const searchValue = caseSensitive ? searchInput : searchInput.toLowerCase();
                    const compareValue = caseSensitive ? cellValue : cellValue.toLowerCase();
                    
                    if (exactMatch) {
                        return compareValue === searchValue;
                    } else {
                        return compareValue.includes(searchValue);
                    }
                });
            });
            
            hot.loadData(filteredData);
            updateFilterInfo(`Showing ${filteredData.length} of ${originalData.length} rows`);
            
        } else {
            clearSearch();
        }
    }

    // Function to update filter information display
    function updateFilterInfo(message = '') {
        const filterInfo = document.getElementById('filter-info');
        if (message) {
            filterInfo.textContent = message;
        } else if (currentFilter) {
            filterInfo.textContent = `Filtered by: "${currentFilter}"`;
        } else {
            filterInfo.textContent = 'Showing all data';
        }
    }

    // Function to clear search and filters
    function clearSearch() {
        document.getElementById('search-input').value = '';
        
        // Restore original data if filtered
        if (currentFilter || hot.getData().length !== originalData.length) {
            hot.loadData(originalData);
            currentFilter = '';
        }
        
        hot.render();
        updateFilterInfo();
    }

    // Allow Enter key to trigger filter
    document.getElementById('search-input').addEventListener('keyup', function(event) {
        if (event.key === 'Enter') {
            performFilter();
        }
    });


    function saveData() {
        const updatedData = hot.getData();
        
        // If filtered, we need to map back to original IDs
        let fullData;
        if (currentFilter) {
            // For filtered data, we need to be more careful about ID mapping
            const filteredIds = updatedData.map(row => row[0]);
            fullData = originalData
                .filter(row => filteredIds.includes(row[0]))
                .map((row, index) => [row[0], ...updatedData[index].slice(1)]);
        } else {
            fullData = updatedData.map((row, index) => [
                window.employeeIds[index] || null,
                ...row.slice(1)
            ]);
        }
        
        fetch('/update-grid', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ updatedData: fullData })
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === 'success') {
                alert('Data saved to database successfully!');
                // Refresh data after save to get any server-side changes
                refreshData();
            }
        })
        .catch(error => {
            console.error('Error saving data:', error);
            alert('Error saving data');
        });
    }
</script>
</body>
</html>
